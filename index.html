<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeForge — Professional Font Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg: #0a0a0c;
  --surface: #111114;
  --surface2: #17171b;
  --surface3: #1f1f24;
  --surface4: #27272d;
  --border: #252529;
  --border-hover: #3a3a42;
  --text: #f0f0f2;
  --text-dim: #9898a8;
  --text-muted: #4a4a58;
  --accent: #7c3aed;
  --accent-light: #a78bfa;
  --accent-dim: rgba(124,58,237,0.13);
  --magenta: #d946ef;
  --magenta-dim: rgba(217,70,239,0.12);
  --radius: 8px;
  --radius-sm: 5px;
  --radius-xs: 3px;
  --left-w: 300px;
  --right-w: 290px;
  --transition: 110ms ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:2px}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden}
.panel{display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.left-panel{width:var(--left-w);border-right:1px solid var(--border)}
.right-panel{width:var(--right-w);border-left:1px solid var(--border)}
.panel-body{flex:1;overflow-y:auto;overflow-x:hidden}

/* ── Panel Header ── */
.panel-header{padding:14px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.brand{display:flex;align-items:baseline;gap:8px}
.brand-name{
  font-size:15px;font-weight:900;letter-spacing:-0.6px;
  background:linear-gradient(130deg,#c084fc,#e879f9,#f472b6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.brand-tag{font-size:10px;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;font-weight:500}
.right-header-title{font-size:12px;font-weight:600;color:var(--text-dim);letter-spacing:-.2px}

/* ── Sections ── */
.section{padding:13px 16px;border-bottom:1px solid var(--border)}
.section:last-child{border-bottom:none}
.sec-label{
  font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:7px;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Text Input ── */
#word-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:9px 12px;color:var(--text);font-size:15px;font-weight:500;outline:none;
  letter-spacing:-.2px;transition:border-color var(--transition),box-shadow var(--transition);
  caret-color:var(--accent-light);font-family:inherit;
}
#word-input::placeholder{color:var(--text-muted)}
#word-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}

/* ── Style Tags ── */
.style-tags{display:flex;flex-wrap:wrap;gap:5px}
.style-tag{
  padding:4px 10px;border-radius:100px;border:1px solid var(--border);background:transparent;
  color:var(--text-dim);font-size:11px;font-weight:500;cursor:pointer;
  transition:all var(--transition);white-space:nowrap;letter-spacing:-.1px;
}
.style-tag:hover{border-color:var(--border-hover);color:var(--text);background:var(--surface2)}
.style-tag.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent-light)}

/* ── Font Grid ── */
.font-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.font-card{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px;cursor:pointer;transition:all var(--transition);overflow:hidden;
  min-height:70px;display:flex;flex-direction:column;justify-content:space-between;gap:5px;
}
.font-card:hover{border-color:var(--border-hover);background:var(--surface3);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.35)}
.font-card.active{border-color:var(--accent);background:var(--surface3);box-shadow:0 0 0 1px var(--accent),inset 0 0 20px var(--accent-dim)}
.card-preview{font-size:24px;line-height:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-name{font-size:9px;font-weight:500;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em}
.font-card.active .card-name{color:var(--accent-light)}

/* ── Sliders ── */
.slider-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.slider-row:last-of-type{margin-bottom:0}
.slider-label{font-size:11px;color:var(--text-dim);width:80px;flex-shrink:0}
.slider-wrap{flex:1}
input[type="range"]{
  -webkit-appearance:none;appearance:none;width:100%;height:3px;
  background:var(--surface4);border-radius:2px;outline:none;cursor:pointer;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;background:var(--accent-light);
  border-radius:50%;cursor:pointer;box-shadow:0 0 0 3px rgba(167,139,250,.2);
  transition:transform var(--transition),box-shadow var(--transition);
}
input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.25);box-shadow:0 0 0 5px rgba(167,139,250,.25)}
.slider-val{font-size:10px;color:var(--text-muted);width:38px;text-align:right;flex-shrink:0;font-feature-settings:'tnum'}

/* ── Toggles ── */
.toggle-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:9px}
.toggle-btn{
  padding:5px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--surface2);color:var(--text-dim);font-size:11px;font-weight:500;
  cursor:pointer;transition:all var(--transition);
}
.toggle-btn:hover{border-color:var(--border-hover);color:var(--text)}
.toggle-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent-light)}

/* ── Swatches ── */
.swatches{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.swatch{
  width:20px;height:20px;border-radius:var(--radius-xs);cursor:pointer;
  border:1.5px solid rgba(255,255,255,.06);
  transition:transform var(--transition),box-shadow var(--transition),border-color var(--transition);flex-shrink:0;
}
.swatch:hover{transform:scale(1.2)}
.swatch.active{border-color:rgba(255,255,255,.8);box-shadow:0 0 0 2px var(--bg),0 0 0 4px rgba(255,255,255,.3)}
.color-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.color-pick{display:flex;align-items:center;gap:5px;flex:1;min-width:70px}
.color-pick label{font-size:10px;color:var(--text-muted);white-space:nowrap}
input[type="color"]{-webkit-appearance:none;width:26px;height:26px;border:1px solid var(--border-hover);border-radius:var(--radius-xs);background:transparent;cursor:pointer;padding:1px}
input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
input[type="color"]::-webkit-color-swatch{border:none;border-radius:2px}
input[type="color"]:hover{border-color:var(--accent)}
.invert-btn{padding:5px 9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-size:11px;cursor:pointer;transition:all var(--transition);white-space:nowrap}
.invert-btn:hover{border-color:var(--border-hover);color:var(--text)}

/* ── Gradient Picker ── */
.grad-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.grad-pill{
  width:26px;height:26px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;
  transition:transform var(--transition),box-shadow var(--transition),border-color var(--transition);flex-shrink:0;
}
.grad-pill:hover{transform:scale(1.18)}
.grad-pill.active{border-color:rgba(255,255,255,.85);box-shadow:0 0 0 2px var(--bg),0 0 0 4px rgba(255,255,255,.3)}
.grad-none{background:var(--surface4) !important;border:2px solid var(--border-hover) !important;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-muted);font-weight:700;letter-spacing:0}

/* ── BG Presets ── */
.bg-presets{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
.bg-preset{
  width:34px;height:22px;border-radius:var(--radius-xs);cursor:pointer;
  border:1.5px solid rgba(255,255,255,.06);
  transition:transform var(--transition),box-shadow var(--transition),border-color var(--transition);flex-shrink:0;
}
.bg-preset:hover{transform:scale(1.1)}
.bg-preset.active{border-color:rgba(255,255,255,.75);box-shadow:0 0 0 2px var(--bg),0 0 0 3px rgba(255,255,255,.25)}

/* ── Decorations ── */
.deco-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.deco-btn{
  padding:7px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--surface2);color:var(--text-dim);font-size:11px;font-weight:500;
  cursor:pointer;transition:all var(--transition);text-align:left;
  display:flex;align-items:center;gap:5px;
}
.deco-icon{font-size:12px;line-height:1;flex-shrink:0;opacity:.65}
.deco-btn:hover{border-color:var(--border-hover);color:var(--text);background:var(--surface3)}
.deco-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent-light)}
.shadow-controls{margin-top:10px;display:none}
.shadow-controls.visible{display:block}

/* ── Preview Panel ── */
.preview-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.preview-bar{
  padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--surface);
}
.preview-meta{flex:1;min-width:0}
.preview-font{font-size:13px;font-weight:600;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-tag{font-size:10px;color:var(--text-muted);margin-top:1px}
.size-btns{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.size-btn{padding:5px 9px;border:none;background:transparent;color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;transition:all var(--transition);border-right:1px solid var(--border)}
.size-btn:last-child{border-right:none}
.size-btn:hover{color:var(--text);background:var(--surface3)}
.size-btn.active{background:var(--accent-dim);color:var(--accent-light)}
.bar-actions{display:flex;gap:5px}
.action-btn{
  padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--surface2);color:var(--text-dim);font-size:11px;font-weight:500;
  cursor:pointer;transition:all var(--transition);white-space:nowrap;
}
.action-btn:hover{border-color:var(--border-hover);color:var(--text);background:var(--surface3)}
.action-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.action-btn.primary:hover{background:#6d28d9;border-color:#6d28d9}

/* ── Canvas ── */
.preview-canvas{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;transition:background .12s}
.preview-canvas::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,255,255,.013) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.013) 1px,transparent 1px);
  background-size:48px 48px;
}
.preview-canvas.light-bg::before{opacity:0}
.preview-canvas-inner{display:flex;align-items:center;justify-content:center;width:100%;height:100%;transition:max-width .2s ease;position:relative;z-index:1}
#preview-text{max-width:90%;word-break:break-word;padding:40px;pointer-events:none;user-select:none;transition:font-family .1s}

/* ── Glitch effect ── */
@keyframes glitch1{
  0%,100%{clip-path:inset(0 0 88% 0);transform:translate(-4px,0);color:#ff006e}
  25%{clip-path:inset(15% 0 55% 0);transform:translate(3px,0);color:#ff006e}
  50%{clip-path:inset(60% 0 10% 0);transform:translate(-3px,0);color:#ff006e}
  75%{clip-path:inset(35% 0 40% 0);transform:translate(2px,0);color:#ff006e}
}
@keyframes glitch2{
  0%,100%{clip-path:inset(75% 0 0% 0);transform:translate(4px,0);color:#00f5ff}
  25%{clip-path:inset(5% 0 75% 0);transform:translate(-3px,0);color:#00f5ff}
  50%{clip-path:inset(45% 0 25% 0);transform:translate(3px,0);color:#00f5ff}
  75%{clip-path:inset(20% 0 60% 0);transform:translate(-2px,0);color:#00f5ff}
}
.glitch-active{position:relative;display:inline-block}
.glitch-active::before,.glitch-active::after{
  content:attr(data-text);position:absolute;inset:0;
  font-family:inherit;font-size:inherit;font-weight:inherit;
  letter-spacing:inherit;line-height:inherit;font-style:inherit;
  text-align:inherit;width:100%;
}
.glitch-active::before{animation:glitch1 .75s infinite steps(1)}
.glitch-active::after{animation:glitch2 .75s infinite steps(1) .12s}

/* ── Right Panel — Discovery ── */
.discover-search{padding:11px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-wrap{position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:12px;pointer-events:none}
#font-search{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:8px 10px 8px 30px;color:var(--text);font-size:12px;outline:none;
  transition:border-color var(--transition),box-shadow var(--transition);font-family:inherit;
}
#font-search::placeholder{color:var(--text-muted)}
#font-search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.discover-body{flex:1;overflow-y:auto}
.discover-section{padding:11px 14px;border-bottom:1px solid var(--border)}
.discover-section:last-child{border-bottom:none}
.discover-label{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.discover-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Ref Cards ── */
.ref-card{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 11px;margin-bottom:6px;transition:all var(--transition);
}
.ref-card:last-child{margin-bottom:0}
.ref-card:hover{border-color:var(--border-hover);background:var(--surface3)}
.ref-preview{font-size:28px;line-height:1;color:var(--text);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ref-meta{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.ref-name{font-size:11px;font-weight:600;color:var(--text-dim);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ref-tag{font-size:9px;color:var(--text-muted);background:var(--surface4);border:1px solid var(--border);border-radius:3px;padding:1px 5px;white-space:nowrap}
.ref-vibe{font-size:10px;color:var(--text-muted);margin-bottom:7px;font-style:italic;line-height:1.4}
.ref-actions{display:flex;gap:4px}
.ref-btn{
  padding:4px 9px;border-radius:var(--radius-xs);border:1px solid var(--border);
  background:var(--surface3);color:var(--text-dim);font-size:10px;font-weight:500;
  cursor:pointer;transition:all var(--transition);text-decoration:none;
  display:inline-flex;align-items:center;gap:3px;
}
.ref-btn:hover{border-color:var(--border-hover);color:var(--text)}
.try-btn:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent-light)}
.view-btn:hover{background:var(--magenta-dim);border-color:var(--magenta);color:var(--magenta)}
.famous-note{
  margin-top:9px;padding:8px 10px;background:var(--surface3);border-radius:var(--radius-sm);
  border-left:2px solid var(--border-hover);
}
.famous-note p{font-size:10px;color:var(--text-muted);line-height:1.6}
.famous-note strong{color:var(--text-dim);font-weight:600}
.search-empty{text-align:center;padding:28px 14px;color:var(--text-muted);font-size:12px;line-height:1.7}

/* ── Export Panel ── */
.export-overlay{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.export-panel{
  background:var(--surface);border:1px solid var(--border-hover);border-radius:12px;
  width:min(620px,calc(100vw - 32px));max-height:calc(100vh - 64px);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.7);
}
.export-panel__header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.export-panel__title{font-size:13px;font-weight:700;letter-spacing:-.3px}
.export-panel__close{
  width:26px;height:26px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--surface2);color:var(--text-muted);font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
}
.export-panel__close:hover{border-color:var(--border-hover);color:var(--text)}
.export-panel__tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 18px;gap:2px}
.export-panel__tab{
  padding:9px 14px;border:none;background:transparent;color:var(--text-muted);
  font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:all var(--transition);font-family:inherit;
}
.export-panel__tab:hover{color:var(--text-dim)}
.export-panel__tab.active{color:var(--accent-light);border-bottom-color:var(--accent)}
.export-panel__body{flex:1;overflow:auto;padding:16px 18px}
.export-panel__code{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;font-family:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  font-size:12px;line-height:1.65;color:#c9d1d9;overflow-x:auto;white-space:pre;
  min-height:180px;
}
.export-panel__footer{
  padding:12px 18px;border-top:1px solid var(--border);display:flex;
  align-items:center;justify-content:flex-end;gap:8px;flex-shrink:0;
}
.export-panel__copy{
  padding:7px 20px;border-radius:var(--radius-sm);border:none;
  background:var(--accent);color:#fff;font-size:12px;font-weight:600;
  cursor:pointer;transition:background var(--transition);font-family:inherit;
}
.export-panel__copy:hover{background:#6d28d9}
.export-panel__copy.copied{background:#16a34a}
.export-panel__hint{font-size:10px;color:var(--text-muted)}

/* ── Toast ── */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--surface4);border:1px solid var(--border-hover);border-radius:var(--radius);
  padding:9px 16px;font-size:12px;font-weight:500;color:var(--text);
  opacity:0;pointer-events:none;z-index:1000;transition:opacity .18s,transform .18s;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Responsive */
@media(max-width:1000px){:root{--right-w:260px}}
@media(max-width:800px){.right-panel{display:none}}
@media(max-width:700px){
  html,body{overflow:auto;height:auto}
  .app{flex-direction:column;height:auto}
  .left-panel{width:100%;border-right:none;border-bottom:1px solid var(--border)}
  .panel-body{overflow:visible;max-height:none}
  .preview-panel{min-height:60vh}
}
</style>
</head>
<body>

<div class="app">

<!-- ══ LEFT PANEL ═══════════════════════════════════════════════════════ -->
<div class="panel left-panel">
  <div class="panel-header">
    <div class="brand">
      <span class="brand-name">TypeForge</span>
      <span class="brand-tag">Font Studio</span>
    </div>
  </div>
  <div class="panel-body">

    <!-- Text -->
    <div class="section">
      <div class="sec-label">Text</div>
      <input type="text" id="word-input" placeholder="Type something…" value="Hello World" autocomplete="off" spellcheck="false">
    </div>

    <!-- Style -->
    <div class="section">
      <div class="sec-label">Style</div>
      <div class="style-tags" id="style-tags"></div>
    </div>

    <!-- Fonts -->
    <div class="section">
      <div class="sec-label" id="font-sec-label">Fonts</div>
      <div style="position:relative;margin-bottom:8px">
        <span style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:11px;pointer-events:none">⌕</span>
        <input type="text" id="font-picker-search" placeholder="Search Google Fonts…"
          aria-label="Search Google Fonts" autocomplete="off" spellcheck="false"
          style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px 7px 26px;color:var(--text);font-size:11px;outline:none;font-family:inherit;transition:border-color var(--transition),box-shadow var(--transition);caret-color:var(--accent-light)">
      </div>

════════════════════════════════════════════════════════════════════════ */

let GF_FONTS = [];            // [{family, category}]
let GF_ACTIVE_CAT = 'all';   // category filter in search mode

const GF_CAT_LABELS = {
  'all':'All', 'sans-serif':'Sans', 'serif':'Serif',
  'display':'Display', 'handwriting':'Script', 'monospace':'Mono',
};

async function fetchGoogleFonts() {
  const el = document.getElementById('font-picker-search');
  if (el) { el.disabled = true; el.placeholder = 'Loading Google Fonts…'; }
  try {
    const res = await fetch(
      'https://www.googleapis.com/webfonts/v1/webfonts?key=AIzaSyD-9tSrke72PouQMnMX-a7eZSW0jkFMBWY&sort=popularity'
    );
    const data = await res.json();
    GF_FONTS = (data.items || []).slice(0, 200).map(f => ({
      family:   f.family,
      category: f.category,
    }));
  } catch(e) {
    GF_FONTS = [];
    console.warn('GF API unavailable, using curated fonts only.');
  }
  if (el) {
    el.disabled = false;
    el.placeholder = GF_FONTS.length
      ? `Search ${GF_FONTS.length} Google Fonts…`
      : 'Search fonts…';
  }
  const qNow = el?.value?.trim() || '';
  if (qNow) handleFontPickerSearch(qNow);
}

function buildCatTabs(query) {
  const wrap = document.getElementById('font-cat-tabs');
  if (!wrap) return;
  if (!query.trim()) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';
  wrap.innerHTML = '';
  const cats = ['all', 'sans-serif', 'serif', 'display', 'handwriting', 'monospace'];
  cats.forEach(cat => {
    const count = cat === 'all'
      ? GF_FONTS.filter(f => f.family.toLowerCase().includes(query.toLowerCase())).length
      : GF_FONTS.filter(f => f.category === cat && f.family.toLowerCase().includes(query.toLowerCase())).length;
    if (count === 0 && cat !== 'all') return;
    const btn = document.createElement('button');
    btn.style.cssText = 'padding:3px 9px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:10px;cursor:pointer;transition:all .11s ease;font-family:inherit;white-space:nowrap';
    btn.textContent = `${GF_CAT_LABELS[cat]} (${count})`;
    if (cat === GF_ACTIVE_CAT) {
      btn.style.background = 'var(--accent-dim)';
      btn.style.borderColor = 'var(--accent)';
      btn.style.color = 'var(--accent-light)';
    }
    btn.addEventListener('click', () => {
      GF_ACTIVE_CAT = cat;
      handleFontPickerSearch(query);
    });
    wrap.appendChild(btn);
  });
}

function handleFontPickerSearch(query) {
  const label = document.getElementById('font-sec-label');
  const q = query.trim().toLowerCase();
  if (!q) {
    if (label) label.textContent = 'Fonts';
    document.getElementById('font-cat-tabs').style.display = 'none';
    GF_ACTIVE_CAT = 'all';
    buildFontGrid(STYLES[S.style] || []);
    return;
  }
  buildCatTabs(q);
  const results = GF_FONTS
    .filter(f => (GF_ACTIVE_CAT === 'all' || f.category === GF_ACTIVE_CAT)
               && f.family.toLowerCase().includes(q))
    .slice(0, 16)
    .map(f => f.family);
  if (label) label.textContent = `Fonts — ${results.length} result${results.length !== 1 ? 's' : ''}`;
  if (results.length) {
    loadFonts(results);
    document.fonts.ready.then(() => buildFontGrid(results));
  } else {
    const grid = document.getElementById('font-grid');
    grid.innerHTML = `<div style="grid-column:1/-1;padding:14px 0;text-align:center;font-size:11px;color:var(--text-muted)">No fonts match "<em>${escHtml(query)}</em>"</div>`;
  }
}

/* ════════════════════════════════════════════════════════════════════════
   PERSISTENCE — localStorage + URL hash
════════════════════════════════════════════════════════════════════════ */

const PERSIST_KEYS = ['text','style','font','weight','size','spacing','lineHeight',
  'italic','align','textColor','bgColor','bgPreset','textGrad','decos',
  'shadowOff','shadowBlur','previewSz'];

function saveState() {
  try {
    const data = {};
    PERSIST_KEYS.forEach(k => { data[k] = k === 'decos' ? [...S[k]] : S[k]; });
    const json = JSON.stringify(data);
    localStorage.setItem('typeforge_state', json);
    const hash = btoa(encodeURIComponent(json));
    if (location.hash.slice(1) !== hash) history.replaceState(null, '', '#' + hash);
  } catch(e) { /* quota / private mode */ }
}

function loadState() {
  try {
    let json = null;
    if (location.hash.length > 1) {
      try { json = decodeURIComponent(atob(location.hash.slice(1))); } catch(e) {}
    }
    if (!json) json = localStorage.getItem('typeforge_state');
    if (!json) return false;
    const data = JSON.parse(json);
    PERSIST_KEYS.forEach(k => {
      if (data[k] === undefined) return;
      S[k] = k === 'decos' ? new Set(data[k]) : data[k];
    });
    return true;
  } catch(e) { return false; }
}

function restoreUI() {
  document.getElementById('word-input').value = S.text;
  [['weight', S.weight, v => String(Math.round(v))],
   ['size', S.size, v => v + 'px'],
   ['spacing', S.spacing, v => parseFloat(v).toFixed(1) + 'px'],
   ['lineheight', S.lineHeight, v => parseFloat(v).toFixed(2)],
   ['shadow-offset', S.shadowOff, v => v + 'px'],
   ['shadow-blur', S.shadowBlur, v => v + 'px']]
  .forEach(([id, val, fmt]) => {
    const sl = document.getElementById(id), vl = document.getElementById(id + '-val');
    if (sl) sl.value = val;
    if (vl) vl.textContent = fmt(val);
  });
  document.getElementById('italic-btn').classList.toggle('active', S.italic);
  document.querySelectorAll('[data-align]').forEach(b =>
    b.classList.toggle('active', b.dataset.align === S.align));
  document.getElementById('text-color').value = S.textColor;
  document.getElementById('bg-color').value   = S.bgColor;
  document.querySelectorAll('.size-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.sz === S.previewSz));
  document.getElementById('shadow-controls')
    .classList.toggle('visible', S.decos.has('shadow') || S.decos.has('long-shadow'));
}

/* ════════════════════════════════════════════════════════════════════════
   FONT LOADING
════════════════════════════════════════════════════════════════════════ */

function loadFonts(fonts) {
  const needed = fonts.filter(f => !S.loaded.has(f));
  if (!needed.length) return;
  const families = needed.map(f =>
    `family=${encodeURIComponent(f)}:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700`
  ).join('&');
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.crossOrigin = 'anonymous';
  link.href = `https://fonts.googleapis.com/css2?${families}&display=swap`;
  document.head.appendChild(link);
  needed.forEach(f => S.loaded.add(f));
}

/* ════════════════════════════════════════════════════════════════════════
   BUILD UI
════════════════════════════════════════════════════════════════════════ */

function buildStyleTags() {
  const el = document.getElementById('style-tags');
  el.innerHTML = '';
  for (const name of Object.keys(STYLES)) {
    const btn = document.createElement('button');
    btn.className = 'style-tag' + (name === S.style ? ' active' : '');
    btn.textContent = name;
    btn.addEventListener('click', () => pickStyle(name));
    el.appendChild(btn);
  }
}

function buildSwatches() {
  const el = document.getElementById('swatches');
  el.innerHTML = '';
  SWATCHES.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (c.toLowerCase() === S.textColor.toLowerCase() ? ' active' : '');
    sw.style.background = c;
    sw.addEventListener('click', () => {
      S.textColor = c;
      document.getElementById('text-color').value = c;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      render();
    });
    el.appendChild(sw);
  });
}

function buildGradPills() {
  const el = document.getElementById('grad-row');
  el.innerHTML = '';
  TEXT_GRADIENTS.forEach(g => {
    const pill = document.createElement('div');
    pill.className = 'grad-pill' + (g.id === 'none' ? ' grad-none' : '') + (g.id === S.textGrad ? ' active' : '');
    if (g.css) pill.style.background = g.css;
    if (g.id === 'none') pill.textContent = '✕';
    pill.title = g.label;
    pill.addEventListener('click', () => {
      S.textGrad = g.id;
      document.querySelectorAll('.grad-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      render();
    });
    el.appendChild(pill);
  });
}

function buildBgPresets() {
  const el = document.getElementById('bg-presets');
  el.innerHTML = '';
  BG_PRESETS.forEach(p => {
    const div = document.createElement('div');
    div.className = 'bg-preset' + (p.id === S.bgPreset ? ' active' : '');
    div.style.background = p.css || S.bgColor;
    div.title = p.label;
    div.addEventListener('click', () => {
      S.bgPreset = p.id;
      if (!p.css) {
        // solid — keep current bgColor
      }
      document.querySelectorAll('.bg-preset').forEach(b => b.classList.remove('active'));
      div.classList.add('active');
      render();
    });
    el.appendChild(div);
  });
}

function buildDecoGrid() {
  const el = document.getElementById('deco-grid');
  el.innerHTML = '';
  DECOS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'deco-btn' + (S.decos.has(d.id) ? ' active' : '');
    btn.dataset.deco = d.id;
    btn.innerHTML = `<span class="deco-icon">${d.icon}</span>${d.label}`;
    btn.addEventListener('click', () => {
      S.decos.has(d.id) ? S.decos.delete(d.id) : S.decos.add(d.id);
      btn.classList.toggle('active', S.decos.has(d.id));
      const needsShadow = S.decos.has('shadow') || S.decos.has('long-shadow');
      document.getElementById('shadow-controls').classList.toggle('visible', needsShadow);
      render();
    });
    el.appendChild(btn);
  });
}

function buildFontGrid(fonts) {
  const grid = document.getElementById('font-grid');
  grid.innerHTML = '';
  fonts.forEach(font => {
    const card = document.createElement('div');
    card.className = 'font-card' + (font === S.font ? ' active' : '');
    card.innerHTML = `
      <div class="card-preview" style="font-family:'${font}',sans-serif;">${S.text || 'Aa'}</div>
      <div class="card-name">${font}</div>`;
    card.addEventListener('click', () => {
      S.font = font;
      document.querySelectorAll('.font-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      render();
    });
    grid.appendChild(card);
  });
}

function refreshFontCardText() {
  document.querySelectorAll('.card-preview').forEach(el => {
    el.textContent = S.text || 'Aa';
  });
}

/* ════════════════════════════════════════════════════════════════════════
   DISCOVERY PANEL
════════════════════════════════════════════════════════════════════════ */

function buildRefCard(f, previewText) {
  const card = document.createElement('div');
  card.className = 'ref-card';
  const gfUrl = `https://fonts.google.com/specimen/${encodeURIComponent(f.name.replace(/ /g,'+'))}`;
  card.innerHTML = `
    <div class="ref-preview" style="font-family:'${f.name}',serif;">${previewText}</div>
    <div class="ref-meta">
      <span class="ref-name">${f.name}</span>
      <span class="ref-tag">${f.cat}</span>
    </div>
    <div class="ref-vibe">${f.vibe}</div>
    <div class="ref-actions">
      <button class="ref-btn try-btn">↳ Try It</button>
      <a class="ref-btn view-btn" href="${gfUrl}" target="_blank" rel="noopener">Google Fonts ↗</a>
    </div>`;
  card.querySelector('.try-btn').addEventListener('click', () => {
    S.font = f.name;
    loadFonts([f.name]);
    // update grid selection if visible
    document.querySelectorAll('.font-card').forEach(c => {
      c.classList.toggle('active', c.querySelector('.card-name')?.textContent === f.name);
    });
    render();
    toast(`Applied ${f.name}`);
  });
  // load font for preview
  loadFonts([f.name]);
  return card;
}

function updateDiscovery(style) {
  const query = document.getElementById('font-search').value.trim().toLowerCase();
  if (query) { handleSearch(query); return; }

  const body = document.getElementById('discover-body');
  body.innerHTML = '';

  // Auto-suggestions section
  const suggestSec = document.createElement('div');
  suggestSec.className = 'discover-section';
  const sugLabel = document.createElement('div');
  sugLabel.className = 'discover-label';
  sugLabel.textContent = 'Suggested for this style';
  suggestSec.appendChild(sugLabel);

  const tags = STYLE_SUGGEST_TAGS[style] || [];
  const suggestions = FONT_DB
    .filter(f => f.tags.some(t => tags.includes(t)))
    .filter(f => !STYLES[style]?.includes(f.name))
    .slice(0, 5);

  const previewText = S.text || 'Typeface';
  suggestions.forEach(f => suggestSec.appendChild(buildRefCard(f, previewText)));

  // Famous references note
  if (STYLE_FAMOUS[style]) {
    const note = document.createElement('div');
    note.className = 'famous-note';
    note.innerHTML = `<p><strong>Industry references:</strong> ${STYLE_FAMOUS[style]} — well-known typefaces in this genre (many are commercial/premium).</p>`;
    suggestSec.appendChild(note);
  }

  body.appendChild(suggestSec);

  // Style explorer
  const exploreSec = document.createElement('div');
  exploreSec.className = 'discover-section';
  const expLabel = document.createElement('div');
  expLabel.className = 'discover-label';
  expLabel.textContent = 'Explore adjacent styles';
  exploreSec.appendChild(expLabel);

  const adjacent = Object.keys(STYLES).filter(s => s !== style);
  adjacent.slice(0, 4).forEach(s => {
    const chip = document.createElement('button');
    chip.style.cssText = 'margin:3px 3px 0 0;padding:4px 10px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:11px;cursor:pointer;transition:all .11s ease;font-family:inherit;';
    chip.textContent = s;
    chip.addEventListener('mouseenter', () => { chip.style.borderColor='var(--border-hover)';chip.style.color='var(--text)'; });
    chip.addEventListener('mouseleave', () => { chip.style.borderColor='var(--border)';chip.style.color='var(--text-dim)'; });
    chip.addEventListener('click', () => pickStyle(s));
    exploreSec.appendChild(chip);
  });
  body.appendChild(exploreSec);
}

function handleSearch(query) {
  const body = document.getElementById('discover-body');
  body.innerHTML = '';

  if (!query) { updateDiscovery(S.style); return; }

  const results = FONT_DB.filter(f =>
    f.name.toLowerCase().includes(query) ||
    f.tags.some(t => t.includes(query)) ||
    f.cat.toLowerCase().includes(query) ||
    f.vibe.toLowerCase().includes(query)
  ).slice(0, 12);

  const sec = document.createElement('div');
  sec.className = 'discover-section';
  const label = document.createElement('div');
  label.className = 'discover-label';
  label.textContent = results.length ? `${results.length} font${results.length > 1 ? 's' : ''} found` : 'No results';
  sec.appendChild(label);

  if (!results.length) {
    const empty = document.createElement('div');
    empty.className = 'search-empty';
    empty.innerHTML = `No fonts matched "<strong>${query}</strong>"<br>Try: serif, condensed, retro, brush…`;
    sec.appendChild(empty);
  } else {
    const previewText = S.text || 'Typeface';
    results.forEach(f => sec.appendChild(buildRefCard(f, previewText)));
  }

  body.appendChild(sec);
}

/* ════════════════════════════════════════════════════════════════════════
   PICK STYLE
════════════════════════════════════════════════════════════════════════ */

function pickStyle(name) {
  S.style = name;
  document.querySelectorAll('.style-tag').forEach(b => b.classList.toggle('active', b.textContent === name));
  const fonts = STYLES[name];
  loadFonts(fonts);
  S.font = fonts[0];
  buildFontGrid(fonts);
  updateDiscovery(name);
  render();
}

/* ════════════════════════════════════════════════════════════════════════
   BIND CONTROLS
════════════════════════════════════════════════════════════════════════ */

function bindSlider(id, key, fmt) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(id + '-val');
  sl.addEventListener('input', () => {
    S[key] = parseFloat(sl.value);
    if (vl) vl.textContent = fmt(sl.value);
    render();
  });
}

function bindControls() {
  let t;
  document.getElementById('word-input').addEventListener('input', e => {
    clearTimeout(t);
    t = setTimeout(() => {
      S.text = e.target.value;
      refreshFontCardText();
      render();
    }, 16);
  });

  bindSlider('weight',        'weight',     v => v);
  bindSlider('size',          'size',       v => v + 'px');
  bindSlider('spacing',       'spacing',    v => parseFloat(v).toFixed(1) + 'px');
  bindSlider('lineheight',    'lineHeight', v => parseFloat(v).toFixed(2));
  bindSlider('shadow-offset', 'shadowOff',  v => v + 'px');
  bindSlider('shadow-blur',   'shadowBlur', v => v + 'px');

  document.getElementById('italic-btn').addEventListener('click', () => {
    S.italic = !S.italic;
    document.getElementById('italic-btn').classList.toggle('active', S.italic);
    render();
  });

  document.querySelectorAll('[data-align]').forEach(btn => {
    btn.addEventListener('click', () => {
      S.align = btn.dataset.align;
      document.querySelectorAll('[data-align]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  document.getElementById('text-color').addEventListener('input', e => {
    S.textColor = e.target.value;
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    render();
  });

  document.getElementById('bg-color').addEventListener('input', e => {
    S.bgColor = e.target.value;
    S.bgPreset = 'solid';
    document.querySelectorAll('.bg-preset').forEach(b => b.classList.remove('active'));
    document.querySelector('.bg-preset')?.classList.add('active');
    render();
  });

  document.getElementById('invert-btn').addEventListener('click', () => {
    [S.textColor, S.bgColor] = [S.bgColor, S.textColor];
    document.getElementById('text-color').value = S.textColor;
    document.getElementById('bg-color').value = S.bgColor;
    S.bgPreset = 'solid';
    document.querySelectorAll('.bg-preset').forEach(b => b.classList.remove('active'));
    document.querySelector('.bg-preset')?.classList.add('active');
    render();
  });

  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      S.previewSz = btn.dataset.sz;
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyPreviewSize();
    });
  });

  document.getElementById('btn-css').addEventListener('click', openExportPanel);
  document.getElementById('btn-png').addEventListener('click', exportPng);
  document.getElementById('btn-svg').addEventListener('click', exportSvg);

  // Font picker search (GF API)
  const fpsEl = document.getElementById('font-picker-search');
  if (fpsEl) {
    let fst;
    fpsEl.addEventListener('focus', e => { e.target.style.borderColor='var(--accent)'; e.target.style.boxShadow='0 0 0 3px var(--accent-dim)'; });
    fpsEl.addEventListener('blur',  e => { e.target.style.borderColor=''; e.target.style.boxShadow=''; });
    fpsEl.addEventListener('input', e => {
      clearTimeout(fst);
      fst = setTimeout(() => handleFontPickerSearch(e.target.value), 150);
    });
    // Clear search when style tag is clicked
    document.getElementById('style-tags').addEventListener('click', () => {
      fpsEl.value = '';
      handleFontPickerSearch('');
    });
  }

  // Discovery search (right panel)
  let st;
  document.getElementById('font-search').addEventListener('input', e => {
    clearTimeout(st);
    st = setTimeout(() => handleSearch(e.target.value.trim().toLowerCase()), 120);
  });
}

/* ════════════════════════════════════════════════════════════════════════
   SHADOW / EFFECT BUILDERS
════════════════════════════════════════════════════════════════════════ */

function build3DExtrude(color) {
  const r = parseInt(color.slice(1,3)||'00',16);
  const g = parseInt(color.slice(3,5)||'00',16);
  const b = parseInt(color.slice(5,7)||'00',16);
  const parts = [];
  for (let i = 1; i <= 10; i++) {
    const f = Math.max(0, 1 - i * 0.08);
    parts.push(`${i}px ${i}px 0 rgb(${Math.floor(r*f)},${Math.floor(g*f)},${Math.floor(b*f)})`);
  }
  return parts.join(', ');
}

function buildTextShadow() {
  const parts = [];
  const c = S.textColor;

  if (S.decos.has('shadow')) {
    parts.push(`${S.shadowOff}px ${S.shadowOff}px ${S.shadowBlur}px rgba(0,0,0,0.6)`);
  }
  if (S.decos.has('long-shadow')) {
    for (let i = 1; i <= 22; i++) {
      const alpha = Math.max(0, 0.048 - i * 0.0022).toFixed(3);
      parts.push(`${i*2}px ${i*2}px 0 rgba(0,0,0,${alpha})`);
    }
  }
  if (S.decos.has('neon')) {
    parts.push(`0 0 5px ${c}, 0 0 15px ${c}, 0 0 35px ${c}, 0 0 70px ${c}`);
  }
  if (S.decos.has('3d-extrude')) {
    parts.push(build3DExtrude(c));
  }
  if (S.decos.has('letterpress')) {
    parts.push(`0 1px 0 rgba(255,255,255,0.12), 0 -1px 0 rgba(0,0,0,0.6), 1px 0 1px rgba(0,0,0,0.3)`);
  }
  return parts.length ? parts.join(', ') : 'none';
}

/* ════════════════════════════════════════════════════════════════════════
   RENDER
════════════════════════════════════════════════════════════════════════ */

function render() {
  const el = document.getElementById('preview-text');
  const canvas = document.getElementById('preview-canvas');
  const inner = document.getElementById('preview-inner');

  const displayText = S.text || 'Type something…';

  /* ── Glitch effect uses a wrapper ── */
  if (S.decos.has('glitch')) {
    inner.innerHTML = `<div id="preview-text" class="glitch-active" data-text="${escHtml(displayText)}">${escHtml(displayText)}</div>`;
  } else {
    if (inner.querySelector('.glitch-active')) {
      inner.innerHTML = `<div id="preview-text">${escHtml(displayText)}</div>`;
    } else {
      document.getElementById('preview-text').textContent = displayText;
    }
  }

  const pt = document.getElementById('preview-text');

  pt.style.fontFamily    = `'${S.font}', sans-serif`;
  pt.style.fontWeight    = S.weight;
  pt.style.fontSize      = S.size + 'px';
  pt.style.letterSpacing = S.spacing + 'px';
  pt.style.lineHeight    = S.lineHeight;
  pt.style.fontStyle     = S.italic ? 'italic' : 'normal';
  pt.style.textAlign     = S.align;
  pt.style.maxWidth      = '90%';
  pt.style.wordBreak     = 'break-word';
  pt.style.padding       = '40px';
  pt.style.pointerEvents = 'none';
  pt.style.userSelect    = 'none';

  /* ── Text gradient or solid color ── */
  const grad = TEXT_GRADIENTS.find(g => g.id === S.textGrad);
  if (grad && grad.css && !S.decos.has('outline')) {
    pt.style.background              = grad.css;
    pt.style.webkitBackgroundClip    = 'text';
    pt.style.webkitTextFillColor     = 'transparent';
    pt.style.backgroundClip          = 'text';
    pt.style.color                   = 'transparent';
    pt.style.webkitTextStroke        = '';
  } else {
    pt.style.background              = 'none';
    pt.style.webkitBackgroundClip    = '';
    pt.style.webkitTextFillColor     = '';
    pt.style.backgroundClip          = '';
    pt.style.color = S.decos.has('outline') ? 'transparent' : S.textColor;
    pt.style.webkitTextStroke = S.decos.has('outline') ? `2px ${S.textColor}` : '';
  }

  /* ── Text decoration ── */
  const decList = [];
  if (S.decos.has('underline')) decList.push('underline');
  if (S.decos.has('overline'))  decList.push('overline');
  if (S.decos.has('strike'))    decList.push('line-through');
  pt.style.textDecoration      = decList.length ? decList.join(' ') : 'none';
  pt.style.textDecorationColor = S.textColor;

  /* ── Text shadow ── */
  pt.style.textShadow = buildTextShadow();

  /* ── Blur BG ── */
  inner.style.backdropFilter = S.decos.has('blur-bg') ? 'blur(14px)' : '';
  inner.style.webkitBackdropFilter = inner.style.backdropFilter;

  /* ── Stamp ── */
  if (S.decos.has('stamp')) {
    pt.style.transform    = 'rotate(-2.5deg)';
    pt.style.border       = `3px solid ${S.textColor}`;
    pt.style.padding      = '18px 28px';
    pt.style.borderRadius = '3px';
    pt.style.opacity      = '0.88';
  } else {
    pt.style.transform    = '';
    pt.style.border       = '';
    pt.style.padding      = '40px';
    pt.style.borderRadius = '';
    pt.style.opacity      = '';
  }

  /* ── Background ── */
  const bgPreset = BG_PRESETS.find(p => p.id === S.bgPreset);
  if (bgPreset && bgPreset.css) {
    canvas.style.background = bgPreset.css;
  } else {
    canvas.style.background = S.bgColor;
  }

  /* ── Grid dot visibility ── */
  const bgSample = bgPreset?.css || S.bgColor;
  canvas.classList.toggle('light-bg', isBright(bgSample));

  /* ── Meta ── */
  document.getElementById('preview-font').textContent = S.font;
  document.getElementById('preview-tag').textContent  = S.style;
  saveState();
}

function isBright(bg) {
  if (bg.startsWith('linear-gradient') || bg.startsWith('radial-gradient')) return false;
  const h = bg.replace('#','');
  if (h.length < 6) return false;
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  return (0.299*r + 0.587*g + 0.114*b) > 185;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ════════════════════════════════════════════════════════════════════════
   EXPORT PANEL — T3
════════════════════════════════════════════════════════════════════════ */

let exportActiveTab = 'css';

function fontCategory() {
  const f = FONT_DB.find(x => x.name === S.font);
  if (!f) return 'sans-serif';
  const m = { Grotesque:'sans-serif', Geometric:'sans-serif', Serif:'serif',
    'Slab Serif':'serif', Display:'sans-serif', Retro:'sans-serif',
    Handwriting:'cursive', Script:'cursive', Monospace:'monospace',
    Techno:'sans-serif' };
  return m[f.cat] || 'sans-serif';
}

function buildExportCss() {
  const decList = [];
  if (S.decos.has('underline')) decList.push('underline');
  if (S.decos.has('overline'))  decList.push('overline');
  if (S.decos.has('strike'))    decList.push('line-through');
  const shadow   = buildTextShadow();
  const grad     = TEXT_GRADIENTS.find(g => g.id === S.textGrad);
  const bgPreset = BG_PRESETS.find(p => p.id === S.bgPreset);
  const bgValue  = bgPreset?.css || S.bgColor;
  const importUrl = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(S.font)}:ital,wght@0,${S.weight}${S.italic?`;1,${S.weight}`:''}& display=swap`;
  const cat = fontCategory();
  const lines = [
    `/* TypeForge Export — ${S.font} · ${S.style} */`,
    `@import url('${importUrl.replace(/ /g,'')}');`,
    ``,
    `.my-text {`,
    `  font-family: '${S.font}', ${cat};`,
    `  font-weight: ${S.weight};`,
    `  font-size: ${S.size}px;`,
    `  line-height: ${S.lineHeight};`,
    `  letter-spacing: ${S.spacing}px;`,
    `  text-align: ${S.align};`,
  ];
  if (S.italic) lines.push(`  font-style: italic;`);
  if (grad?.css) {
    lines.push(`  background: ${grad.css};`,
      `  -webkit-background-clip: text;`,
      `  -webkit-text-fill-color: transparent;`,
      `  background-clip: text;`);
  } else {
    lines.push(`  color: ${S.decos.has('outline') ? 'transparent' : S.textColor};`);
    if (S.decos.has('outline')) lines.push(`  -webkit-text-stroke: 2px ${S.textColor};`);
  }
  if (decList.length) lines.push(`  text-decoration: ${decList.join(' ')};`);
  if (shadow !== 'none') lines.push(`  text-shadow: ${shadow};`);
  if (S.decos.has('stamp')) lines.push(`  transform: rotate(-2.5deg);`, `  border: 3px solid ${S.textColor};`, `  opacity: 0.88;`);
  lines.push(`  background-color: ${bgValue};`, `}`);
  return lines.join('\n');
}

function buildExportVariables() {
  const grad     = TEXT_GRADIENTS.find(g => g.id === S.textGrad);
  const bgPreset = BG_PRESETS.find(p => p.id === S.bgPreset);
  const bgValue  = bgPreset?.css || S.bgColor;
  const cat      = fontCategory();
  const importUrl = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(S.font)}:wght@${S.weight}&display=swap`;
  return [
    `/* TypeForge Export — CSS Variables */`,
    `@import url('${importUrl}');`,
    ``,
    `:root {`,
    `  --tf-font-family:    '${S.font}', ${cat};`,
    `  --tf-font-weight:    ${S.weight};`,
    `  --tf-font-size:      ${S.size}px;`,
    `  --tf-line-height:    ${S.lineHeight};`,
    `  --tf-letter-spacing: ${S.spacing}px;`,
    `  --tf-text-align:     ${S.align};`,
    `  --tf-text-color:     ${S.textColor};`,
    `  --tf-bg-color:       ${bgValue};`,
    `}`,
    ``,
    `.my-text {`,
    `  font-family:    var(--tf-font-family);`,
    `  font-weight:    var(--tf-font-weight);`,
    `  font-size:      var(--tf-font-size);`,
    `  line-height:    var(--tf-line-height);`,
    `  letter-spacing: var(--tf-letter-spacing);`,
    `  text-align:     var(--tf-text-align);`,
    `  color:          var(--tf-text-color);`,
    `  background-color: var(--tf-bg-color);`,
    ...(grad?.css ? [
      `  /* gradient text */`,
      `  background: ${grad.css};`,
      `  -webkit-background-clip: text;`,
      `  -webkit-text-fill-color: transparent;`,
      `  background-clip: text;`] : []),
    `}`,
  ].join('\n');
}

function buildExportTailwind() {
  const grad     = TEXT_GRADIENTS.find(g => g.id === S.textGrad);
  const bgPreset = BG_PRESETS.find(p => p.id === S.bgPreset);
  const bgValue  = bgPreset?.css || S.bgColor;
  const importUrl = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(S.font)}:wght@${S.weight}&display=swap`;
  const weightMap = {100:'thin',200:'extralight',300:'light',400:'normal',500:'medium',600:'semibold',700:'bold',800:'extrabold',900:'black'};
  const alignMap  = {left:'text-left',center:'text-center',right:'text-right'};
  const w = weightMap[S.weight] || `[${S.weight}]`;
  const a = alignMap[S.align]   || `text-${S.align}`;
  const classes = [
    `font-['${S.font.replace(/ /g,'_')}']`,
    `font-${w}`,
    `text-[${S.size}px]`,
    `leading-[${S.lineHeight}]`,
    S.spacing !== 0 ? `tracking-[${S.spacing}px]` : null,
    a,
    !grad?.css ? `text-[${S.textColor}]` : null,
    S.italic ? 'italic' : null,
    S.decos.has('underline') ? 'underline' : null,
    S.decos.has('strike') ? 'line-through' : null,
  ].filter(Boolean).join(' ');
  return [
    `<!-- Tailwind v3 — TypeForge Export -->`,
    `<!-- Add font import to your <head>: -->`,
    `<!-- <link href="${importUrl}" rel="stylesheet"> -->`,
    ``,
    `<p class="${classes}">`,
    `  Your text here`,
    `</p>`,
    ...(grad?.css ? [
      ``,
      `<!-- Gradient text requires custom CSS: -->`,
      `<style>`,
      `.gradient-text {`,
      `  background: ${grad.css};`,
      `  -webkit-background-clip: text;`,
      `  -webkit-text-fill-color: transparent;`,
      `  background-clip: text;`,
      `}`,
      `</style>`] : []),
  ].join('\n');
}

function refreshExportCode() {
  const pre = document.getElementById('export-code');
  const hint = document.getElementById('export-hint');
  if (!pre) return;
  if (exportActiveTab === 'css')       { pre.textContent = buildExportCss();       if(hint) hint.textContent = 'Paste directly into any stylesheet'; }
  if (exportActiveTab === 'variables') { pre.textContent = buildExportVariables(); if(hint) hint.textContent = 'Override variables per component'; }
  if (exportActiveTab === 'tailwind')  { pre.textContent = buildExportTailwind();  if(hint) hint.textContent = 'Requires Tailwind v3 + arbitrary values enabled'; }
}

function openExportPanel() {
  refreshExportCode();
  document.getElementById('export-overlay').style.display = 'flex';
}

function closeExportPanel() {
  document.getElementById('export-overlay').style.display = 'none';
}

function bindExportPanel() {
  document.getElementById('export-close').addEventListener('click', closeExportPanel);
  document.getElementById('export-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeExportPanel();
  });
  document.querySelectorAll('[data-export-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      exportActiveTab = btn.dataset.exportTab;
      document.querySelectorAll('[data-export-tab]').forEach(b => {
        b.classList.toggle('active', b === btn);
        b.setAttribute('aria-selected', b === btn ? 'true' : 'false');
      });
      refreshExportCode();
    });
  });
  const copyBtn = document.getElementById('export-copy-btn');
  copyBtn.addEventListener('click', () => {
    const code = document.getElementById('export-code').textContent;
    navigator.clipboard.writeText(code).then(() => {
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
    }).catch(() => toast('Copy failed'));
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('export-overlay').style.display !== 'none') {
      closeExportPanel();
    }
  });
}

/* legacy alias kept for SVG/PNG exports */
function copyCss() { openExportPanel(); }

/* ════════════════════════════════════════════════════════════════════════
   EXPORT PNG
════════════════════════════════════════════════════════════════════════ */

function exportPng() {
  const canvas = document.getElementById('preview-canvas');
  const bgPreset = BG_PRESETS.find(p => p.id === S.bgPreset);
  const bgValue = bgPreset?.css?.startsWith('linear') ? '#0a0a0c' : (bgPreset?.css || S.bgColor);
  toast('Rendering PNG…');
  html2canvas(canvas, {
    backgroundColor: bgValue,
    scale: 2,
    useCORS: true,
    allowTaint: true,
    logging: false,
  }).then(c => {
    const a = document.createElement('a');
    a.download = `typeforge-${S.font.replace(/\s+/g,'-').toLowerCase()}.png`;
    a.href = c.toDataURL('image/png');
    a.click();
    toast('PNG exported!');
  }).catch(() => toast('Export failed'));
}

/* ════════════════════════════════════════════════════════════════════════
   EXPORT SVG
════════════════════════════════════════════════════════════════════════ */

function exportSvg() {
  const importUrl = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(S.font)}:wght@${S.weight}&display=swap`;
  const W = 900, H = 450;
  const shadow = buildTextShadow();
  const filterAttr = shadow !== 'none' ? `filter="url(#ds)"` : '';
  const bgPreset = BG_PRESETS.find(p => p.id === S.bgPreset);
  const bgFill = bgPreset?.css?.startsWith('linear') ? '#0a0a0c' : (bgPreset?.css || S.bgColor);

  let defs = `<style>@import url('${importUrl}');</style>`;
  if (shadow !== 'none') {
    defs += `<filter id="ds"><feDropShadow dx="${S.shadowOff}" dy="${S.shadowOff}" stdDeviation="${S.shadowBlur/2}" flood-opacity="0.55"/></filter>`;
  }

  const decList = [];
  if (S.decos.has('underline')) decList.push('underline');
  if (S.decos.has('overline'))  decList.push('overline');
  if (S.decos.has('strike'))    decList.push('line-through');

  const svgText = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">
  <defs>${defs}</defs>
  <rect width="${W}" height="${H}" fill="${bgFill}"/>
  <text
    x="${W/2}" y="${H/2}"
    dominant-baseline="middle"
    text-anchor="middle"
    font-family="'${S.font}', sans-serif"
    font-weight="${S.weight}"
    font-size="${Math.min(S.size, 130)}"
    font-style="${S.italic ? 'italic' : 'normal'}"
    letter-spacing="${S.spacing}"
    fill="${S.decos.has('outline') ? 'transparent' : S.textColor}"
    stroke="${S.decos.has('outline') ? S.textColor : 'none'}"
    stroke-width="${S.decos.has('outline') ? 2 : 0}"
    text-decoration="${decList.join(' ') || 'none'}"
    ${filterAttr}
  >${escHtml(S.text)}</text>
</svg>`;

  const blob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.download = `typeforge-${S.font.replace(/\s+/g,'-').toLowerCase()}.svg`;
  a.href = url;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
  toast('SVG exported!');
}

/* ════════════════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════════════════ */

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ════════════════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════════════════ */

function init() {
  const restored = loadState();
  buildStyleTags();
  buildSwatches();
  buildGradPills();
  buildBgPresets();
  buildDecoGrid();
  bindControls();
  if (restored) {
    const fonts = STYLES[S.style] || STYLES['Swiss / Clean'];
    loadFonts(fonts);
    buildFontGrid(fonts);
    updateDiscovery(S.style);
    restoreUI();
    render();
  } else {
    pickStyle(S.style);
  }
  applyPreviewSize();
  bindExportPanel();
  fetchGoogleFonts(); // non-blocking; populates GF_FONTS when ready
}

init();
</script>
